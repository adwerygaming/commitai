name: CommitAI CI

on:
    push:
        branches: [ main, dev ]
    pull_request:
        branches: [ main, dev ]

jobs:
    lint-and-build:
        runs-on: ubuntu-latest

        steps:
        - name: "Checkout Repo"
          uses: actions/checkout@v4

        - name: "Install Node"
          uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: npm

        - name: "Install dependencies"
          run: npm ci

        - name: "Lint - Check for errors & unused vars"
          run: npm run lint