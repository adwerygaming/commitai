name: commitai

services:
  pgadmin:
    container_name: commitai-pgadmin
    image: dpage/pgadmin4:latest
    restart: always
    ports:
      - ${PGADMIN_PORT}:80
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@masdepan.my.id
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    networks:
      - commitai-networking

  db:
    container_name: commitai-db
    image: postgres:18.2-alpine
    restart: always
    environment: 
      POSTGRES_DB: commitai
      POSTGRES_USER: commitai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: 
      - ./volumes/db_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    ports:
      - ${POSTGRES_PORT}:5432
    networks:
      - commitai-networking

networks:
  commitai-networking:
    name: commitai-network